model:
  name: "distilbert-base-uncased"

task:
  path: None
  dataset_name: "glue"
  task_name: "sst2"

results:
  output_path: "glue"

train:
  epochs: 3
  batch: None
  samples: -1
  
run:
  seeds: 10
  seed: 24
  deterministic: True
  
noise:
  algo:
    control: True # Controlls all noise
    types: # Allows varying noise control
      fixed_seeds: True # weights initialization, data augmentation, batch shuffling
      batch_shuffling: True
      single_batch: False # TODO:

  impl:
    control: True
    types:
      determ_alg: True
      fixed_cudnn: True

